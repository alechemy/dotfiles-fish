format = """
$username\
$hostname\
$directory\
$git_branch\
$git_state\
$git_status\
$cmd_duration\
$line_break\
$python\
$character"""

# The first git call in a fresh session is cold (binary, fsmonitor daemon, and
# working-tree pages all unwarmed, often racing login I/O), which overruns
# starship's 500ms default and prints a "git timed out" warning. fsmonitor +
# untrackedcache keep warm calls sub-50ms; this just gives the cold one headroom.
command_timeout = 1000

[directory]
style = "blue"

[character]
success_symbol = "[‚ĚĮ](purple)"
error_symbol = "[‚ĚĮ](red)"
vicmd_symbol = "[‚Ěģ](green)"

[git_branch]
format = "[$branch]($style)"
style = "bright-black"

[git_status]
format = "[[(*$conflicted$untracked$modified$staged$renamed$deleted)](218) ($ahead_behind$stashed)]($style)"
style = "cyan"
conflicted = "‚Äč"
untracked = "‚Äč"
modified = "‚Äč"
staged = "‚Äč"
renamed = "‚Äč"
deleted = "‚Äč"
stashed = "‚Č°"

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style = "bright-black"

[cmd_duration]
format = "[$duration]($style) "
style = "yellow"

[python]
format = "[$virtualenv]($style) "
style = "bright-black"
