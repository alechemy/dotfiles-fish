matches:
  # Date expansion
  - trigger: ":today"
    replace: "{{today}}"
    vars:
      - name: today
        type: date
        params:
          format: "%Y-%m-%d"

  # Time expansion
  - trigger: ":time"
    replace: "{{mytime}}"
    vars:
      - name: mytime
        type: date
        params:
          format: "%H:%M"

  # Daily-note timeline jot prefix: "10:04am: " (type after "- ")
  - trigger: ":now"
    replace: "{{jottime}}: "
    vars:
      - name: jottime
        type: date
        params:
          format: "%-I:%M%P"

  # console.log(<cursor>);
  - trigger: :log
    replace: console.log($|$);

  # mail
  - trigger: :mail
    replace: alcuster@icloud.com

  # teh -> the
  - trigger: teh
    replace: the
    word: true

