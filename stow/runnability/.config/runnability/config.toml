# Runnability scoring weights and gates, consumed by runnability.py.
# Re-scoring after an edit is cheap (no audio re-analysis): runnability.py score
#
# Calibrated 2026-07-09 on the two "Running Calibration" playlists (25 great /
# 25 bad) plus 9 user-flagged duds from the first sample-playlist test run:
# AUC 0.947, precision 1.00 / recall 0.84 at score >= 41 (recommend ~45 for
# margin). The mood heads (party, non-relaxed) catch laid-back grooves that
# danceability alone scores high; non-relaxed is the single strongest feature
# (AUC 0.987 great|bad). Cadence and arousal-band terms measured at/below
# chance on this library (great picks include 96-110 BPM groove tracks), so
# their weights are 0 — kept here so they can be re-enabled without code
# changes.

[cadence]
target_spm = 170
sigma_spm = 20.0

[weights]
danceability = 1.0
energy = 1.0
mood_party = 2.0
mood_nonrelaxed = 4.0
pulse = 0.0
cadence = 0.0
arousal = 0.0

[output]
# RUNNABILITY is rounded to this multiple before writing, and unchanged tags
# are never rewritten, so re-score jitter of a point or two can't thrash 10k
# NAS files (and their backups).
quantize = 5

[gates]
# Exact match against the track's genre tag, case-insensitive. The library
# enforces a fixed genre set (see riptag.fish); anything not listed — including
# a missing or Unknown genre — is rejected.
genres_allow = [
  "Country",
  "Electronic",
  "Experimental",
  "Hip-Hop",
  "Mashup",
  "Pop",
  "R&B",
  "Rock",
  "Soundtrack",
]
duration_min = 120
duration_max = 600
